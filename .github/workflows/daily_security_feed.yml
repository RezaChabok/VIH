name: Daily Vulnerability Intelligence Feed (VIH)

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

jobs:
  collect-intelligence:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_DB: vih_ci
          POSTGRES_USER: vih_ci_user
          POSTGRES_PASSWORD: vih_ci_pass
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Vulnerability Intelligence Hub (Main Bot)
        env:
          DATABASE_URL: postgresql://vih_ci_user:vih_ci_pass@localhost:5432/vih_ci
          TELEGRAM_BOT1_TOKEN: ${{ secrets.TELEGRAM_BOT1_TOKEN }}
          TELEGRAM_BOT2_TOKEN: ${{ secrets.TELEGRAM_BOT2_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          RAPIDAPI_KEY: ${{ secrets.RAPIDAPI_KEY }}
        run: python main.py

      - name: Upload error log if failed
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: vih-error-log
          path: error.log
