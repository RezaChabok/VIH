name: Daily Security Feed

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

jobs:
  run-feed:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Restore database from cache
        id: cache-db
        uses: actions/cache@v4
        with:
          path: vih.db
          key: vih-database      # کلید ثابت – همیشه همون فایل رو برمی‌گردونه
          restore-keys: |
            vih-database

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run VIH Bot
        env:
          DATABASE_URL: sqlite:///vih.db
          TELEGRAM_BOT1_TOKEN: ${{ secrets.TELEGRAM_BOT1_TOKEN }}
          TELEGRAM_BOT2_TOKEN: ${{ secrets.TELEGRAM_BOT2_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          RAPIDAPI_KEY: ${{ secrets.RAPIDAPI_KEY }}
          RAPIDAPI_KEY_MEDIUM: ${{ secrets.RAPIDAPI_KEY_MEDIUM }}
        run: python main.py

      - name: Upload updated database to cache
        uses: actions/cache@v4
        with:
          path: vih.db
          key: vih-database
